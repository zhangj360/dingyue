mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'
dns:
    enable: true
    ipv6: false
    default-nameserver: [223.5.5.5, 119.29.29.29, 114.114.114.114]
    fake-ip-range: 198.18.0.1/16
    use-hosts: true
    respect-rules: true
    proxy-server-nameserver: [223.5.5.5, 119.29.29.29, 114.114.114.114]
    nameserver: [223.5.5.5, 119.29.29.29, 114.114.114.114]
    fallback: [1.1.1.1, 8.8.8.8]
    fallback-filter: { geoip: true, geoip-code: CN, geosite: [gfw], ipcidr: [240.0.0.0/4], domain: [+.google.com, +.facebook.com, +.youtube.com] }
proxies:
    - { name: free1,type: anytls,server: 45.221.98.11,port: 11777,password: dongtaiwang.com,client-fingerprint: chrome,udp: true,idle-session-check-interval: 30,idle-session-timeout: 30,min-idle-session: 0,alpn: [h2, http/1.1],skip-cert-verify: true}
    - { name: free2,server: 5.178.101.117,port: 30006,type: tuic,uuid: 36106e0f-4d9a-470b-a3fd-535f3b7a1e92,password: dongtaiwang.com,sni: www.microsoft.com,alpn: [h3],request-timeout: 8000,udp-relay-mode: native,skip-cert-verify: true,congestion-controller: bbr}
    - { name: free3,server: 163.172.116.154,port: 33887,type: tuic,uuid: 9adb384a-0f16-4501-a8f3-b6b2556fce87,password: dongtaiwang.com,sni: bing.com,alpn: [h3],request-timeout: 8000,udp-relay-mode: native,skip-cert-verify: true,congestion-controller: bbr}
    - { name: free4,server: 83.243.86.109,port: 27947,type: tuic,uuid: 261d95d4-73c0-4c33-957a-04b6d407bea2,password: 261d95d4-73c0-4c33-957a-04b6d407bea2,sni: bing.com,alpn: [h3],request-timeout: 8000,udp-relay-mode: native,skip-cert-verify: true,congestion-controller: bbr}
    - { name: free5,type: anytls,server: fan2.856098.xyz,port: 8443,password: dongtaiwang.com,client-fingerprint: chrome,udp: true,idle-session-check-interval: 30,idle-session-timeout: 30,min-idle-session: 0,alpn: [h2, http/1.1],skip-cert-verify: true}
proxy-groups:
    - { name: 节点选择, type: select, proxies: [自动选择, 手动选择, 故障转移, free1, free2, free3, free4, DIRECT]}
    - { name: 自动选择, type: url-test, proxies: [free1, free2, free3, free4], url: 'http://www.gstatic.com/generate_204', interval: 86400 }
    - { name: 手动选择, type: select, proxies: [free1, free2, free3, free4]}
    - { name: BIGO直播, type: select, proxies: [节点选择, 自动选择, 手动选择, 故障转移, DIRECT]}
    - { name: MOMO直播, type: select, proxies: [节点选择, 自动选择, 手动选择, 故障转移, DIRECT]}
    - { name: IPAIR直播, type: select, proxies: [节点选择, 自动选择, 手动选择, 故障转移, DIRECT]}    
    - { name: MEOO直播, type: select, proxies: [DIRECT, 节点选择, 自动选择, 手动选择]}
    - { name: 广告拦截, type: select, proxies: [REJECT, DIRECT]}
    - { name: 故障转移, type: fallback, proxies: [free1, free2, free3, free4], url: 'http://www.gstatic.com/generate_204', interval: 7200 }
    - { name: 兜底, type: select, proxies: [DIRECT, 自动选择, 手动选择]}
